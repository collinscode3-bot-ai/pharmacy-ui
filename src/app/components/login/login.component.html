<div class="login-page">
  <header class="top-strip">
    <div class="brand">PharmaPrecision</div>
    <div class="top-actions" aria-label="Utilities">
      <button mat-icon-button type="button" aria-label="Language">
        <mat-icon>language</mat-icon>
      </button>
      <button mat-icon-button type="button" aria-label="Help">
        <mat-icon>help</mat-icon>
      </button>
    </div>
  </header>

  <main class="content-wrap">
    <section class="login-card" aria-label="Sign in form">
      <div class="brand-icon">
        <mat-icon>medical_services</mat-icon>
      </div>

      <h1>Welcome Back</h1>
      <p class="subtitle">Enter your credentials to access your pharmacy dashboard.</p>

      <div *ngIf="error" class="login-error" role="alert">{{ error }}</div>

      <form class="login-form" novalidate (submit)="onSubmit($event)">
        <label class="field-label" for="username">USERNAME OR EMAIL <span class="required-indicator" aria-hidden="true">*</span></label>
        <mat-form-field appearance="fill" class="login-field">
          <mat-icon matPrefix>person</mat-icon>
            <input id="username" name="username" required aria-required="true" [(ngModel)]="username" #usernameModel="ngModel" matInput type="email" placeholder="clinical.admin@pharma.com" />
            <mat-error *ngIf="usernameModel.invalid && (usernameModel.touched || submitted)">Username is required.</mat-error>
        </mat-form-field>

        <div class="password-row">
          <label class="field-label" for="password">PASSWORD <span class="required-indicator" aria-hidden="true">*</span></label>
          <a routerLink="/forgot-password" class="support-link">FORGOT PASSWORD?</a>
        </div>

          <mat-form-field appearance="fill" class="login-field">
            <mat-icon matPrefix>lock</mat-icon>
            <input id="password" name="password" required aria-required="true" [(ngModel)]="password" #passwordModel="ngModel" matInput type="password" placeholder=".........." />
            <button mat-icon-button matSuffix type="button" aria-label="Show password">
              <mat-icon>visibility</mat-icon>
            </button>
            <mat-error *ngIf="passwordModel.invalid && (passwordModel.touched || submitted)">Password is required.</mat-error>
          </mat-form-field>

          <button class="sign-in-btn" mat-flat-button color="primary" type="submit">
            <span>Sign In</span>
            <mat-icon>arrow_forward</mat-icon>
          </button>
      </form>

      <p class="signup-line">
        New to the platform?
        <a routerLink="/signup">Create an Account</a>
      </p>
    </section>

    <!-- <div class="encryption-line">
      <mat-icon>verified_user</mat-icon>
      <span>AES-256 CLINICAL GRADE ENCRYPTION</span>
    </div> -->

    <footer class="login-footer">
      <div class="footer-links">
        <a href="#">PRIVACY POLICY</a>
        <a href="#">TERMS OF SERVICE</a>
        <!-- <a href="#">SECURITY WHITEPAPER</a> -->
      </div>
      <p>© 2026 AMAK Solutions.</p>
    </footer>
  </main>
</div>
