<aside class="app-sidebar">
  <div class="sidebar-top">
    <div class="app-logo">Pharmacy Management System</div>
    <div class="app-logo">&nbsp;</div>

    <nav class="nav-list" aria-label="Main navigation">
      <a class="nav-item" routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        <mat-icon>dashboard</mat-icon>
        <span>Dashboard</span>
      </a>
      <a class="nav-item" routerLink="/medicine-catalog" routerLinkActive="active">
        <mat-icon>inventory_2</mat-icon>
        <span>Medicine Catalog</span>
      </a>
      <div class="nav-subgroup" routerLinkActive="group-active">
        <div
          class="nav-item nav-parent"
          aria-label="Inventory"
          role="button"
          tabindex="0"
          (click)="toggleInventorySublinks()"
          (keydown.enter)="toggleInventorySublinks()"
          (keydown.space)="toggleInventorySublinks(); $event.preventDefault()"
        >
          <mat-icon>inventory</mat-icon>
          <span>Inventory</span>
        </div>
        <ng-container *ngIf="inventoryExpanded">
          <a class="nav-sublink" routerLink="/purchase-order" routerLinkActive="active">
            Create Purchase Order
          </a>
          <a class="nav-sublink" routerLink="/inventory/purchase-order-tracking" routerLinkActive="active">
            Purchase Order Tracking
          </a>
        </ng-container>
      </div>
      <a class="nav-item" href="javascript:void(0)">
        <mat-icon>local_shipping</mat-icon>
        <span>Suppliers</span>
      </a>
      <a class="nav-item" routerLink="/billing" routerLinkActive="active">
        <mat-icon>receipt_long</mat-icon>
        <span>Billing</span>
      </a>
      <a class="nav-item" routerLink="/billing-history" routerLinkActive="active">
        <mat-icon>history</mat-icon>
        <span>Billing History</span>
      </a>
      <a class="nav-item" href="javascript:void(0)">
        <mat-icon>bar_chart</mat-icon>
        <span>Reports</span>
      </a>
    </nav>
  </div>

  <div class="sidebar-bottom">
    <!-- <button mat-flat-button color="primary" class="new-pres">+ New Prescription</button> -->

    <a class="utility" href="javascript:void(0)">
      <mat-icon>help</mat-icon>
      <span>Support</span>
    </a>
    <a class="utility logout" (click)="logout()" role="button">
      <mat-icon class="logout-icon">logout</mat-icon>
      <span>Logout</span>
    </a>
  </div>
</aside>
